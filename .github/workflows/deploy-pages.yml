name: Deploy to GitHub Pages

on:
  # Human commits to main.
  push:
    branches: [main]
  # After a submission is added: the bot's commit is pushed with GITHUB_TOKEN,
  # which does NOT trigger `push` workflows, so we redeploy via workflow_run
  # once the submission workflow finishes.
  workflow_run:
    workflows: ["Add console submission"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
