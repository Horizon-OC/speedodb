name: Add console submission

on:
  issues:
    types: [opened, edited, labeled]
  # A new comment on an open submission re-runs it (handy for retrying a fixed
  # entry). Bot comments use GITHUB_TOKEN and don't trigger workflows, so this
  # won't loop; closed issues are skipped by the `state == 'open'` guard below.
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write

# Avoid two submissions racing to push at once.
concurrency:
  group: speedodb-data
  cancel-in-progress: false

jobs:
  add-entry:
    # Act on OPEN issues carrying the speedo-submission label and the form body.
    # Requiring the issue to be open means a processed submission (which we close)
    # is never re-added on later edits.
    if: >-
      github.event.issue.state == 'open' &&
      contains(github.event.issue.labels.*.name, 'speedo-submission') &&
      contains(github.event.issue.body, '### Platform') &&
      contains(github.event.issue.body, '### Model')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Parse, append and push (race-proof)
        id: parse
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Re-sync to the latest main and re-apply the append on every attempt,
          # so a concurrent commit landing between checkout and push just makes us
          # retry against fresh data instead of failing with a non-fast-forward.
          for attempt in 1 2 3 4 5; do
            git fetch --quiet origin main
            git reset --quiet --hard origin/main
            # Validation errors exit non-zero -> fail the step (error comment).
            python tools/issue_to_csv.py || exit 1
            python tools/build_data.py
            git add data/entries.csv data.js
            if git diff --cached --quiet; then
              echo "No data changes (duplicate / no-op)."
              exit 0
            fi
            git commit --quiet -m "data: add submission from #${{ github.event.issue.number }}"
            if git push origin HEAD:main; then
              echo "Pushed on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (attempt $attempt) — re-syncing and retrying…"
            sleep $(( (RANDOM % 4) + 2 ))
          done
          echo "::error::Could not push after 5 attempts."
          exit 1

      - name: Comment success and close
        if: success()
        uses: actions/github-script@v7
        env:
          STATUS: ${{ steps.parse.outputs.status }}
        with:
          script: |
            const body = process.env.STATUS === "duplicate"
              ? "ℹ️ This console is already in SpeedoDB — nothing to add. Thanks anyway!"
              : "✅ Added to SpeedoDB — thanks! It will appear on the site after the next Pages deploy.";
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body
            });
            await github.rest.issues.update({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, state: "closed"
            });

      - name: Comment validation error
        if: failure()
        uses: actions/github-script@v7
        env:
          PARSE_ERROR: ${{ steps.parse.outputs.error }}
        with:
          script: |
            const err = process.env.PARSE_ERROR || "The submission could not be processed.";
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `⚠️ Could not add this submission:\n\n> ${err}\n\nEdit the issue to fix it and it will be retried automatically.`
            });
